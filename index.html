// ─── DATA ─────────────────────────────────────────────────────────────────────
const defaultWeights = () => ({
  hooks:    Object.fromEntries(HOOKS.map(k=>[k,50])),
  palettes: Object.fromEntries(PALETTES.map(k=>[k,50])),
  styles:   Object.fromEntries(STYLES.map(k=>[k,50])),
  emotions: Object.fromEntries(EMOTIONS.map(k=>[k,50])),
  ctas:     Object.fromEntries(CTAS.map(k=>[k,50])),
  totalAds:0, totalRounds:0, bestCpa:null, avgCpa:null, cpaHistory:[], winnerHistory:[]
});

const makeBrand = (name, color) => ({
  id: `b_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
  name, color: color||BCOLORS[0],
  weights: defaultWeights(), variants:[], adLog:[], brief:null
});

const defaultMeta = () => {
  const brands = [makeBrand("Marca 1",BCOLORS[0]), makeBrand("Marca 2",BCOLORS[1]), makeBrand("Marca 3",BCOLORS[2])];
  return { brands, activeBrandId: brands[0].id, apiKey:"" };
};

// ─── SCORING + LEARNING ───────────────────────────────────────────────────────
const scoreV = (v,w) => Math.min(100, Math.round(
  [["hooks",v.hook],["palettes",v.palette],["styles",v.style],["emotions",v.emotion],["ctas",v.cta]]
  .reduce((s,[d,k])=>s+(w[d]?.[k]||50),0)/5
));

const learnW = (weights, variant, cpa, avg) => {
  const delta = avg>0 ? ((avg-cpa)/avg)*25 : 0;
  const w = JSON.parse(JSON.stringify(weights));
  [["hooks",variant.hook],["palettes",variant.palette],["styles",variant.style],["emotions",variant.emotion],["ctas",variant.cta]]
    .forEach(([d,k])=>{ if(w[d]?.[k]!==undefined) w[d][k]=Math.max(5,Math.min(100,w[d][k]+delta)); });
  return w;
};

const makeAdName = (brand, variant, idx) => {
  const bn = brand.name.replace(/\s+/g,"").toUpperCase().slice(0,4);
  const rn = String((brand.weights.totalRounds||0)+1).padStart(2,"0");
  const vn = String(idx+1).padStart(2,"0");
  const h  = variant.hook.split("_").map(x=>x[0].toUpperCase()).join("");
  const s  = variant.style.split("_").map(x=>x[0].toUpperCase()).join("");
  return `${bn}-R${rn}-${vn}-${h}-${s}`;
};

// ─── DOWNLOAD HELPERS ─────────────────────────────────────────────────────────
const downloadPNG = (dataUrl, filename) => {

const downloadZIP = async (entries) => {
  // Pure JS ZIP — no external lib needed for simple file bundles
  // We'll use a blob download of each file sequentially with a small delay
  // For a true ZIP we build a minimal ZIP structure manually
  const files = entries.filter(e=>e.imageUrl);
  if(!files.length) return;
  
  // Build minimal ZIP binary
  const enc = new TextEncoder();
  const parts = []; const centralDir = []; let offset = 0;

  for(const entry of files){
    const name = enc.encode(entry.adName+".png");
    const data = Uint8Array.from(atob(entry.imageUrl.split(",")[1]), c=>c.charCodeAt(0));
    
    // Local file header
    const lh = new Uint8Array(30+name.length);
    const lhv = new DataView(lh.buffer);
    lhv.setUint32(0,0x04034b50,true);  // signature
    lhv.setUint16(4,20,true);           // version
    lhv.setUint16(6,0,true);            // flags
    lhv.setUint16(8,0,true);            // no compression
    lhv.setUint16(10,0,true); lhv.setUint16(12,0,true); // time/date
    // CRC32
    let crc=0xFFFFFFFF;
    for(let i=0;i<data.length;i++){crc^=data[i];for(let j=0;j<8;j++)crc=(crc>>>1)^(crc&1?0xEDB88320:0);}
    crc=(crc^0xFFFFFFFF)>>>0;
    lhv.setUint32(14,crc,true);
    lhv.setUint32(18,data.length,true); lhv.setUint32(22,data.length,true);
    lhv.setUint16(26,name.length,true); lhv.setUint16(28,0,true);
    lh.set(name,30);

    // Central dir entry
    const cd = new Uint8Array(46+name.length);
    const cdv = new DataView(cd.buffer);
    cdv.setUint32(0,0x02014b50,true);
    cdv.setUint16(4,20,true); cdv.setUint16(6,20,true);
    cdv.setUint16(8,0,true); cdv.setUint16(10,0,true);
    cdv.setUint16(12,0,true); cdv.setUint16(14,0,true);
    cdv.setUint32(16,crc,true);
    cdv.setUint32(20,data.length,true); cdv.setUint32(24,data.length,true);
    cdv.setUint16(28,name.length,true);
    cdv.setUint16(30,0,true); cdv.setUint16(32,0,true);
    cdv.setUint16(34,0,true); cdv.setUint32(38,0,true);
    cdv.setUint32(42,offset,true);
    cd.set(name,46);

    parts.push(lh,data); centralDir.push(cd);
    offset+=lh.length+data.length;
  }

  const cdSize = centralDir.reduce((s,c)=>s+c.length,0);
  const eocd = new Uint8Array(22);
  const eocdv = new DataView(eocd.buffer);
  eocdv.setUint32(0,0x06054b50,true);
  eocdv.setUint16(4,0,true); eocdv.setUint16(6,0,true);
  eocdv.setUint16(8,files.length,true); eocdv.setUint16(10,files.length,true);
  eocdv.setUint32(12,cdSize,true); eocdv.setUint32(16,offset,true);
  eocdv.setUint16(20,0,true);

  const blob = new Blob([...parts,...centralDir,eocd],{type:"application/zip"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=`AdScaleOS_${entries[0]?.brandName||"brand"}_R${entries[0]?.round||"1"}.zip`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
};

// ─── API ──────────────────────────────────────────────────────────────────────
const callClaude = async (messages) => {
  const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages})});
  const d = await r.json(); return d.content?.map(c=>c.text||"").join("")||"";
};

const callGPTImage = async (key, prompt) => {
  const r = await fetch("https://api.openai.com/v1/images/generations",{method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
    body:JSON.stringify({model:"gpt-image-1",prompt,n:1,size:"1024x1024",quality:"high"})});
  const d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.data?.[0]?.b64_json ? `data:image/png;base64,${d.data[0].b64_json}` : d.data?.[0]?.url;
};

const analyzeShot = async (b64) => {
  const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/png",data:b64}},
      {type:"text",text:`Analyze this Meta Ads Manager screenshot. Extract ALL visible ad rows with their metrics. Return ONLY a valid JSON array, no markdown, no explanation:
[{"adName":"exact ad name as shown","impressions":number_or_null,"ctr":number_or_null,"cpa":number_or_null,"spend":number_or_null,"purchases":number_or_null,"roas":number_or_null}]`}
    ]}]})});
  const d = await r.json();
  try { return JSON.parse((d.content?.[0]?.text||"[]").replace(/```json|```/g,"").trim()); }
  catch { return []; }
};

  <Card glow={color} style={{padding:"14px 18px"}}>
    <div style={{fontSize:9,color:T.muted,fontFamily:T.mono,letterSpacing:"1.2px",marginBottom:5}}>{icon} {label}</div>

    {sub&&<div style={{fontSize:9,color:"#2a2a35",marginTop:3}}>{sub}</div>}
  </Card>
);

const Spark = ({data,color="#00f5d4",w=130,h=36}) => {
  if(!data||data.length<2) return <div style={{width:w,height:h,display:"flex",alignItems:"center",justifyContent:"center",color:"#1e1e28",fontSize:10,fontFamily:T.mono}}>sin datos</div>;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*(h-4)-2}`).join(" ");
  return <svg width={w} height={h}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><polyline points={`0,${h} ${pts} ${w},${h}`} fill={`${color}10`} stroke="none"/></svg>;
};

  const doBrief = useCallback(async()=>{
    if(!briefForm.productName.trim()) return;

    try {
      const raw = await callClaude([{role:"user",content:`You are a world-class direct response strategist specialized in Meta Ads that scale to $100k/day. Analyze this product and return a complete ad brief as JSON only, no markdown.

Product: ${briefForm.productName}
URL: ${briefForm.productUrl||"N/A"}

  "targetAudience":"detailed avatar with demographics and psychographics",
  "mainBenefit":"primary transformation in one powerful sentence",

    {"headline":"...","body":"2-line supporting copy","cta":"..."},
    {"headline":"...","body":"2-line supporting copy","cta":"..."},

    {"headline":"...","body":"2-line supporting copy","cta":"..."}
  ]
}`}]);
      const brief = JSON.parse(raw.replace(/```json|```/g,"").trim());

    if(!meta?.apiKey){ alert("Configura tu API key de OpenAI en Ajustes."); return; }

    setImgError(p=>({...p,[variant.id]:null}));
    try {
      const imgNote = prodPics.length>0 ? `${prodPics.length} product reference images provided` : "";

      const resp = await fetch("/generate-image", {
        method: "POST",

        body: JSON.stringify({ apiKey: meta.apiKey, prompt })
      });

      const url = data.data?.[0]?.b64_json

        : data.data?.[0]?.url;

      if(!url) throw new Error("OpenAI no devolvió imagen. Verifica tu acceso a gpt-image-1.");

      const imgEntry = {
        id: `img_${Date.now()}_${variant.id}`,
        brandId: brand.id, brandName: brand.name, brandColor: brand.color,
        variantId: variant.id, adName: variant.adName,
        round: (brand.weights.totalRounds||0)+1,
        hook: variant.hook, style: variant.style,
        palette: variant.palette, emotion: variant.emotion,
        headline: variant.headline, bodyText: variant.bodyText,
        predictedScore: variant.predictedScore,
        imageUrl: url, format: "PNG 1024×1024",
        status: "generated", metrics: null, createdAt: Date.now()
      };

      mutBrand(b=>{ const v=b.variants.find(x=>x.id===variant.id); if(v){v.imageUrl=url;v.imgEntryId=imgEntry.id;v.status="generated";} });
    } catch(e){
      console.error("doImage error:", e);

        });

    const winner=valid.reduce((a,c)=>parseFloat(c.cpa)<parseFloat(a.cpa)?c:a,valid[0]);

                  </div>
                </div>
                <button onClick={()=>{setShotSrc(null);setShotMets([]);}} style={{padding:"6px 12px",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:6,color:"#555",cursor:"pointer",fontSize:10}}>← Subir otro</button>
              </div>
            )}
            {brand?.adLog?.length>0&&(
              <div style={{marginTop:24}}>
                <div style={{fontSize:8,color:T.muted,fontFamily:T.mono,letterSpacing:"1.5px",marginBottom:10}}>HISTORIAL</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                    <thead><tr style={{borderBottom:`1px solid ${T.faint}`}}>{["Ad","Hook","Estilo","CPA","CTR","ROAS","Compras"].map(h=><th key={h} style={{textAlign:"left",padding:"0 9px 7px 0",fontFamily:T.mono,fontSize:7,color:"#2a2a35",fontWeight:600,letterSpacing:"0.5px"}}>{h}</th>)}</tr></thead>
                    <tbody>{brand.adLog.slice(0,10).map((l,i)=>(
                      <tr key={i} style={{borderBottom:`1px solid ${T.faint}`}}>
                        <td style={{padding:"6px 9px 6px 0",fontFamily:T.mono,color:"#555",fontSize:9}}>{l.adName}</td>
                        <td style={{padding:"6px 9px 6px 0"}}><Tag color="#c77dff" xs>{LBL.hooks[l.hook]||l.hook}</Tag></td>
                        <td style={{padding:"6px 9px 6px 0"}}><Tag color="#4cc9f0" xs>{LBL.styles[l.style]||l.style}</Tag></td>
                        <td style={{padding:"6px 9px 6px 0",fontFamily:T.mono,color:"#00f5d4",fontWeight:700}}>{l.cpa!=null?`$${parseFloat(l.cpa).toFixed(2)}`:"—"}</td>
                        <td style={{padding:"6px 9px 6px 0",color:"#555"}}>{l.ctr!=null?`${l.ctr}%`:"—"}</td>
                        <td style={{padding:"6px 9px 6px 0",color:"#555"}}>{l.roas!=null?`${l.roas}x`:"—"}</td>
                        <td style={{padding:"6px 0",color:"#555"}}>{l.purchases||"—"}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── SETTINGS ── */}
        {view==="settings"&&(
          <div style={{animation:"fadeUp .3s ease",maxWidth:560}}>
            <div style={{marginBottom:22}}>
              <div style={{fontSize:8,color:"#00f5d4",fontFamily:T.mono,letterSpacing:"2.5px",marginBottom:2}}>SISTEMA</div>
              <h1 style={{margin:0,fontSize:20,fontWeight:900,letterSpacing:"-0.6px"}}>Ajustes</h1>
            </div>
            <Card style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,marginBottom:10,color:"#ccc"}}>🔑 OpenAI API Key</div>
              <div style={{fontSize:10,color:"#444",marginBottom:8}}>Requerida para GPT Image 2.0. Guardada localmente en tu navegador.</div>
              <div style={{display:"flex",gap:7}}>
                <input type={showKey?"text":"password"} value={showKey?(apiDraft||meta?.apiKey||""):(meta?.apiKey?"••••••••••••••••••":"")} onChange={e=>setApiDraft(e.target.value)} onFocus={()=>{setShowKey(true);setApiDraft(meta?.apiKey||"");}} placeholder="sk-proj-..." style={{flex:1,background:"rgba(255,255,255,0.025)",border:`1px solid ${T.border}`,borderRadius:7,padding:"8px 11px",color:T.text,fontSize:11,outline:"none",fontFamily:T.mono}}/>
                <button onClick={()=>setShowKey(p=>!p)} style={{padding:"8px 10px",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:7,color:"#666",cursor:"pointer",fontSize:10}}>{showKey?"🙈":"👁"}</button>
                <button onClick={()=>{if(apiDraft.trim()){mutMeta(a=>a.apiKey=apiDraft.trim());setShowKey(false);setApiDraft("");}}} style={{padding:"8px 14px",background:"linear-gradient(135deg,#00f5d4,#4cc9f0)",border:"none",borderRadius:7,color:"#000",fontWeight:700,cursor:"pointer",fontSize:11}}>Guardar</button>
              </div>
              {meta?.apiKey&&<div style={{marginTop:6,fontSize:9,color:"#00f5d444",fontFamily:T.mono}}>✓ API KEY ACTIVA</div>}
            </Card>
            <Card style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,marginBottom:10,color:"#ccc"}}>🏢 Gestión de Marcas</div>
              {meta?.brands?.map(b=>(
                <BrandRow key={b.id} brand={b}
                  onRename={name=>mutMeta(a=>{const br=a.brands.find(x=>x.id===b.id);if(br)br.name=name;})}
                  onRecolor={color=>mutMeta(a=>{const br=a.brands.find(x=>x.id===b.id);if(br)br.color=color;})}
                  onReset={()=>window.confirm(`¿Resetear aprendizaje de ${b.name}?`)&&mutMeta(a=>{const br=a.brands.find(x=>x.id===b.id);if(br){br.weights=defaultWeights();br.variants=[];br.adLog=[];br.brief=null;}})}
                  onDelete={()=>meta.brands.length>1&&window.confirm(`¿Eliminar ${b.name}?`)&&mutMeta(a=>{a.brands=a.brands.filter(x=>x.id!==b.id);if(a.activeBrandId===b.id)a.activeBrandId=a.brands[0]?.id;})}
                />
              ))}
            </Card>
            <Card>
              <div style={{fontSize:11,fontWeight:700,marginBottom:8,color:"#ccc"}}>📋 Naming + Formatos</div>
              <div style={{fontFamily:T.mono,fontSize:10,color:"#444",lineHeight:2.2}}>
                <span style={{color:"#00f5d4"}}>MARC-R01-01-PP-UG</span><br/>
                <span style={{color:"#2a2a35"}}>MARC=marca · R01=ronda · PP=hook · UG=estilo</span><br/>
                <span style={{color:"#2a2a35"}}>Formato imagen: PNG 1024×1024px (1:1 square)</span><br/>
                <span style={{color:"#2a2a35"}}>Descarga: individual PNG o ZIP por ronda</span>
              </div>
            </Card>
          </div>
        )}
      </main>

      {/* ═══════════════ LIGHTBOX ═══════════════ */}
      {lightbox&&(
        <div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0a0a14",borderRadius:16,overflow:"hidden",maxWidth:780,width:"100%",border:`1px solid ${T.border}`,display:"grid",gridTemplateColumns:"1fr 1fr",gap:0}}>
            {/* Image */}
            <div style={{position:"relative",aspectRatio:"1",background:"#000"}}>
              {lightbox.imageUrl&&<img src={lightbox.imageUrl} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="ad"/>}
              {lightbox.status==="winner"&&<div style={{position:"absolute",top:12,left:12,padding:"4px 12px",background:"rgba(0,245,212,0.9)",borderRadius:12,fontSize:10,fontWeight:800,color:"#000"}}>🏆 WINNER</div>}
            </div>
            {/* Details */}
            <div style={{padding:20,overflowY:"auto",maxHeight:500}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
                <div style={{fontSize:9,color:T.muted,fontFamily:T.mono}}>{lightbox.adName}</div>
                <button onClick={()=>setLightbox(null)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:16,padding:0,lineHeight:1}}>×</button>
              </div>
              <div style={{fontSize:13,fontWeight:800,color:"#d8d8e8",marginBottom:6,lineHeight:1.4}}>"{lightbox.headline}"</div>
              {lightbox.bodyText&&<div style={{fontSize:11,color:"#555",marginBottom:12,lineHeight:1.5}}>"{lightbox.bodyText}"</div>}
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
                <Tag color="#c77dff" xs>{LBL.hooks[lightbox.hook]||lightbox.hook}</Tag>
                <Tag color="#4cc9f0" xs>{LBL.styles[lightbox.style]||lightbox.style}</Tag>
                <Tag color="#f8961e" xs>{LBL.palettes[lightbox.palette]||lightbox.palette}</Tag>
                <Tag color="#b5e48c" xs>{LBL.emotions[lightbox.emotion]||lightbox.emotion}</Tag>
              </div>
              {lightbox.metrics&&(
                <div style={{background:"rgba(0,245,212,0.04)",border:"1px solid rgba(0,245,212,0.1)",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
                  <div style={{fontSize:8,color:"#00f5d4",fontFamily:T.mono,letterSpacing:"1px",marginBottom:10}}>MÉTRICAS REALES</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {[["CPA",lightbox.metrics.cpa!=null?`$${lightbox.metrics.cpa.toFixed(2)}`:null,"#00f5d4"],
                      ["CTR",lightbox.metrics.ctr!=null?`${lightbox.metrics.ctr}%`:null,"#4cc9f0"],
                      ["ROAS",lightbox.metrics.roas!=null?`${lightbox.metrics.roas}x`:null,"#f8961e"],
                      ["COMPRAS",lightbox.metrics.purchases,"#c77dff"],
                      ["SPEND",lightbox.metrics.spend!=null?`$${lightbox.metrics.spend}`:null,"#b5e48c"],
                      ["IMPRESSIONS",lightbox.metrics.impressions?.toLocaleString(),"#888"]
                    ].map(([lbl,val,col])=>val!=null&&(
                      <div key={lbl}>
                        <div style={{fontSize:7,color:T.muted,fontFamily:T.mono,marginBottom:2,letterSpacing:"0.5px"}}>{lbl}</div>
                        <div style={{fontSize:16,fontWeight:900,color:col,fontFamily:T.mono}}>{val}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div style={{display:"flex",gap:7,marginBottom:12}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:8,color:T.muted,fontFamily:T.mono,marginBottom:3}}>PRED. SCORE</div>
                  <div style={{fontSize:18,fontWeight:900,color:lightbox.predictedScore>=75?"#00f5d4":lightbox.predictedScore>=55?"#f8961e":"#f72585",fontFamily:T.mono}}>{lightbox.predictedScore}</div>
                  <Bar v={lightbox.predictedScore} h={3}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:8,color:T.muted,fontFamily:T.mono,marginBottom:3}}>FORMATO</div>
                  <div style={{fontSize:11,color:"#777",fontFamily:T.mono}}>{lightbox.format}</div>
                </div>
              </div>
              {/* Status */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:8,color:T.muted,fontFamily:T.mono,marginBottom:6}}>ESTADO</div>
                <div style={{display:"flex",gap:5}}>
                  {["generated","testing","winner","paused"].map(st=>(
                    <div key={st} onClick={()=>{setImgs(p=>p.map(x=>x.id===lightbox.id?{...x,status:st}:x));setLightbox(p=>({...p,status:st}));}} style={{flex:1,padding:"4px 0",textAlign:"center",borderRadius:6,cursor:"pointer",fontSize:9,fontWeight:600,background:lightbox.status===st?"rgba(255,255,255,0.1)":"transparent",border:`1px solid ${lightbox.status===st?"rgba(255,255,255,0.15)":T.faint}`,color:lightbox.status===st?"#ccc":"#333"}}>
                      {{generated:"Generado",testing:"Testing",winner:"Winner",paused:"Pausado"}[st]}
                    </div>
                  ))}
                </div>
              </div>
              {lightbox.imageUrl&&(
                <button onClick={()=>downloadPNG(lightbox.imageUrl,lightbox.adName)} style={{width:"100%",padding:"9px 0",background:`linear-gradient(135deg,${meta?.brands?.find(b=>b.id===lightbox.brandId)?.color||"#00f5d4"},#4cc9f0)`,border:"none",borderRadius:8,color:"#000",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                  ↓ Descargar PNG (1024×1024)
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── BRAND ROW ────────────────────────────────────────────────────────────────
function BrandRow({brand,onRename,onRecolor,onReset,onDelete}){
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(brand.name);
  const inputRef=useRef();
  const colors=["#00f5d4","#f72585","#4cc9f0","#f8961e","#b5e48c","#c77dff","#ff9f1c","#2ec4b6","#e63946","#7209b7"];
  const commit=()=>{ if(draft.trim())onRename(draft.trim()); else setDraft(brand.name); setEditing(false); };
  useEffect(()=>{ if(editing)inputRef.current?.focus(); },[editing]);
  return (
    <div style={{padding:"9px 0",borderBottom:`1px solid ${T.faint}`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:7}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:brand.color,cursor:"pointer",boxShadow:`0 0 6px ${brand.color}55`,flexShrink:0}} onClick={()=>{const idx=colors.indexOf(brand.color);onRecolor(colors[(idx+1)%colors.length]);}} title="Click para cambiar"/>
          {editing?(
            <input ref={inputRef} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setDraft(brand.name);setEditing(false);}}} style={{flex:1,background:"rgba(255,255,255,0.05)",border:`1px solid ${brand.color}44`,borderRadius:5,padding:"2px 7px",color:"#fff",fontSize:12,fontWeight:700,outline:"none"}}/>
          ):(
            <span onClick={()=>{setDraft(brand.name);setEditing(true);}} style={{fontSize:12,color:"#ccc",fontWeight:600,cursor:"text",flex:1}}>{brand.name}</span>
          )}
          <span style={{fontSize:8,color:"#252530",fontFamily:"'IBM Plex Mono',monospace",flexShrink:0}}>{brand.weights.totalAds}ads·{brand.weights.totalRounds}r</span>
        </div>
        <div style={{display:"flex",gap:5,flexShrink:0}}>
          <button onClick={()=>{setDraft(brand.name);setEditing(true);}} style={{padding:"2px 8px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:5,color:"#777",cursor:"pointer",fontSize:9}}>✏️</button>
          <button onClick={onReset} style={{padding:"2px 8px",background:"rgba(248,150,30,0.07)",border:"1px solid rgba(248,150,30,0.15)",borderRadius:5,color:"#f8961e",cursor:"pointer",fontSize:9}}>Reset</button>
          <button onClick={onDelete} style={{padding:"2px 8px",background:"rgba(247,37,133,0.07)",border:"1px solid rgba(247,37,133,0.13)",borderRadius:5,color:"#f72585",cursor:"pointer",fontSize:9}}>🗑</button>
        </div>
      </div>
      <div style={{display:"flex",gap:4,marginTop:7,marginLeft:18}}>
        {colors.map(c=><div key={c} onClick={()=>onRecolor(c)} style={{width:12,height:12,borderRadius:"50%",background:c,cursor:"pointer",border:`2px solid ${brand.color===c?"#fff":"transparent"}`,transition:"border .12s"}}/>)}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AdScaleOS));
  </script>
</body>
</html>
